<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaVex Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1117; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #4a5068; font-size: 14px; margin-bottom: 40px; }
        .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 28px; width: 100%; max-width: 600px; }
        label { display: block; font-size: 13px; color: #a9b1d6; margin-bottom: 6px; }
        input, textarea {
            width: 100%; background: #0f1117; border: 1px solid #2a2d3a; border-radius: 8px;
            color: white; font-family: 'JetBrains Mono', monospace; font-size: 13px;
            padding: 10px 12px; margin-bottom: 18px; outline: none; resize: vertical;
        }
        input:focus, textarea:focus { border-color: #7aa2f7; }
        textarea { min-height: 180px; }
        .btn { width: 100%; background: #1d4ed8; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn:disabled { background: #2a2d3a; color: #4a5068; cursor: not-allowed; }
        .result { margin-top: 20px; background: #0f1117; border: 1px solid #2a2d3a; border-radius: 8px; padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #9ece6a; display: none; word-break: break-all; }
        .error { color: #f87171; }
        .copy-result { margin-top: 10px; width: 100%; background: #2a2d3a; color: #a9b1d6; border: 1px solid #3a3d4a; border-radius: 6px; padding: 8px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; display: none; }
        .copy-result:hover { background: #3a3d4a; color: white; }

        /* login screen */
        .login-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 28px; width: 100%; max-width: 360px; }
        .login-card h2 { font-size: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
    <div class="login-card">
        <h2>🔐 LuaVex Dashboard</h2>
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
        <button class="btn" onclick="login()">Login</button>
        <div id="loginError" style="margin-top:12px;font-size:13px;color:#f87171;display:none">Wrong password</div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none;width:100%;max-width:600px">
    <h1>⚡ LuaVex Dashboard</h1>
    <p class="subtitle">Upload a script and generate a protected loader link</p>

    <div class="card">
        <label>Script Name (no spaces)</label>
        <input type="text" id="scriptName" placeholder="e.g. esp, aimbot, walkspeed">

        <label>Lua Script</label>
        <textarea id="scriptContent" placeholder="Paste your Lua script here..."></textarea>

        <button class="btn" id="uploadBtn" onclick="uploadScript()">Generate Loader</button>

        <div class="result" id="result"></div>
        <button class="copy-result" id="copyBtn" onclick="copyLoader()">Copy Loader</button>
    </div>
</div>

<script>
    let password = ""
    let generatedLoader = ""

    function login() {
        const input = document.getElementById('passwordInput').value
        fetch('/api/dashboard', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: input, action: 'ping' })
        }).then(r => {
            // Wrong password returns 401, anything else means password was accepted
            if (r.status === 400) {
                password = input
                document.getElementById('loginScreen').style.display = 'none'
                document.getElementById('dashboard').style.display = 'block'
            } else {
                document.getElementById('loginError').style.display = 'block'
            }
        })
    }

    function generateId() {
        return [...Array(32)].map(() => Math.floor(Math.random() * 16).toString(16)).join('')
    }

    async function uploadScript() {
        const name = document.getElementById('scriptName').value.trim().replace(/\s+/g, '_')
        const content = document.getElementById('scriptContent').value.trim()
        const result = document.getElementById('result')
        const copyBtn = document.getElementById('copyBtn')
        const btn = document.getElementById('uploadBtn')

        if (!name || !content) {
            result.style.display = 'block'
            result.className = 'result error'
            result.innerText = 'Please fill in both fields!'
            return
        }

        const id = generateId()
        btn.disabled = true
        btn.innerText = 'Uploading...'
        result.style.display = 'none'
        copyBtn.style.display = 'none'

        const res = await fetch('/api/dashboard', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password, action: 'upload', scriptName: name, scriptContent: content, scriptId: id })
        })

        const data = await res.json()
        btn.disabled = false
        btn.innerText = 'Generate Loader'
        result.style.display = 'block'

        if (data.success) {
            generatedLoader = data.loader
            result.className = 'result'
            result.innerText = data.loader
            copyBtn.style.display = 'block'
        } else {
            result.className = 'result error'
            result.innerText = 'Error: ' + data.error
        }
    }

    function copyLoader() {
        navigator.clipboard.writeText(generatedLoader)
        const btn = document.getElementById('copyBtn')
        btn.innerText = 'Copied!'
        setTimeout(() => btn.innerText = 'Copy Loader', 2000)
    }
</script>
</body>
</html>
